AllCops:
  DisplayCopNames: true
  DisplayStyleGuide: true
  EnabledByDefault: true
  Exclude:
    - bin/**/*
    - vendor/**/*
  ExtraDetails: true
  NewCops: enable
  TargetRubyVersion: 4.0
  UseCache: true

inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-capybara
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec
  - rubocop-sequel
  - rubocop-thread_safety

inherit_gem:
  docquet:
    - config/cops/bundler.yml
    - config/cops/capybara.yml
    - config/cops/gemspec.yml
    - config/cops/layout.yml
    - config/cops/lint.yml
    - config/cops/metrics.yml
    - config/cops/naming.yml
    - config/cops/performance.yml
    - config/cops/rake.yml
    - config/cops/rspec.yml
    - config/cops/security.yml
    - config/cops/sequel.yml
    - config/cops/style.yml
    - config/cops/thread_safety.yml

inherit_from: .rubocop_todo.yml

Naming/MethodParameterName:
  inherit_mode:
    merge:
      - AllowedNames
  AllowedNames:
    - tz

RSpec/SpecFilePathFormat:
  CustomTransform:
    PastaAtlas: ""

# ROM structs are anonymous subclasses sharing the same constant name as their base class.
# RSpec resolves instance_double by constant name (NamedObjectReference), which picks up the
# base class that has no attribute methods defined, making verifying doubles unusable here.
RSpec/VerifiedDoubles:
  Exclude:
    - spec/actions/**/*.rb
    - spec/operations/**/*.rb
    - spec/views/**/*.rb

Style/Documentation:
  Enabled: false

Style/DocumentationMethod:
  Enabled: false

