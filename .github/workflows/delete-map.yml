name: Delete Map

on:
  workflow_dispatch:
    inputs:
      ulid:
        description: "ULID of the map to delete"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECS_CLUSTER: pasta-atlas-production
  ECS_TASK_DEFINITION: pasta-atlas-production-migrate

jobs:
  delete-map:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cicd
          aws-region: ${{ env.AWS_REGION }}

      - name: Start delete-map task
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --services pasta-atlas-production \
            --query 'services[0].networkConfiguration' \
            --output json)

          TASK_ARN=$(aws ecs run-task \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides "{\"containerOverrides\":[{\"name\":\"pasta-atlas\",\"command\":[\"bundle\",\"exec\",\"rake\",\"maps:delete\"],\"environment\":[{\"name\":\"MAP_ULID\",\"value\":\"${{ inputs.ulid }}\"}]}]}" \
            --no-cli-pager \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "TASK_ARN=$TASK_ARN" >> "$GITHUB_ENV"

      - name: Wait for task to finish
        run: |
          aws ecs wait tasks-stopped \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

      - name: Check result
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1
