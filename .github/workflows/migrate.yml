name: Migrate

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECS_CLUSTER: pasta-atlas-production
  ECS_MIGRATE_TASK_DEFINITION: pasta-atlas-production-migrate

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-cicd
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migration
        run: |
          NETWORK_CONFIG=$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --services pasta-atlas-production \
            --query 'services[0].networkConfiguration' \
            --output json)

          TASK_ARN=$(aws ecs run-task \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$ECS_MIGRATE_TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --no-cli-pager \
            --query 'tasks[0].taskArn' \
            --output text)

          aws ecs wait tasks-stopped \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1
